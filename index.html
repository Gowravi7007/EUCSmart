<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EUCSmart | Secure OTA Console</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-effects">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>
    
    <main class="dashboard">
        <header>
            <div class="brand">
                <div class="logo">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                </div>
                <h1>EUCSmart <span class="badge">SECURE_VERIFY</span></h1>
            </div>
            <div class="status-indicator">
                <div class="pulse"></div>
                <span>SYSTEM ONLINE</span>
            </div>
        </header>

        <section class="grid-container">
            <!-- Upload Form -->
            <div class="glass-panel form-panel">
                <h2>Deploy Firmware OTA</h2>
                <p class="subtitle">Submit binary string and simulated telemetry data for AI verification.</p>
                
                <form id="ota-form">
                    <div class="form-group">
                        <label for="binary">Firmware Binary String</label>
                        <input type="text" id="binary" placeholder="e.g., firmware_v1_bin" required>
                    </div>

                    <div class="form-group">
                        <label for="hash">SHA-256 Checksum (Hash)</label>
                        <div class="input-with-button">
                            <input type="text" id="hash" placeholder="Auto-generate or type manually" required>
                            <button type="button" id="btn-generate-hash" class="btn-secondary">Generate</button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Telemetry Simulation [Sensor1, Sensor2, Sensor3]</label>
                        <div class="telemetry-inputs">
                            <input type="number" step="0.1" id="t1" placeholder="0.5" required>
                            <input type="number" step="0.1" id="t2" placeholder="1.2" required>
                            <input type="number" step="0.1" id="t3" placeholder="0.3" required>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary" id="btn-submit">
                        <span id="btn-text">Initiate Secure Scan</span>
                        <div class="loader" id="submit-loader" style="display:none;"></div>
                    </button>
                </form>
            </div>

            <!-- Analysis Dashboard -->
            <div class="glass-panel results-panel">
                <h2>Analysis Results</h2>
                
                <div id="results-display" class="results-empty">
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
                        <p>Awaiting OTA Submission</p>
                    </div>
                </div>

                <div class="terminal">
                    <div class="terminal-header">
                        <span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span>
                        <span class="term-title">system_logs</span>
                    </div>
                    <div class="terminal-body" id="term-logs">
                        <div>> Initializing verification environment...</div>
                        <div>> Connected to Python AI Service...</div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
